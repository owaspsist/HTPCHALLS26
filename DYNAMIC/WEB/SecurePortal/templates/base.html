<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}SecurePortal{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { margin-top: 0; font-size: 1.4rem; color: #f8fafc; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.85rem; color: #94a3b8; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.95rem;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { background: #4f46e5; }
    .muted { color: #94a3b8; font-size: 0.85rem; }
    .error { color: #f87171; font-size: 0.85rem; margin-top: 0.75rem; }
    .flag {
      margin-top: 1rem;
      padding: 1rem;
      background: #052e16;
      border: 1px solid #16a34a;
      border-radius: 6px;
      color: #4ade80;
      font-family: monospace;
      word-break: break-all;
    }
    a { color: #818cf8; }
    .links { margin-top: 1rem; font-size: 0.85rem; }
    code { background: #0f172a; padding: 0.1rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
