<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DORAVIN PAYANAM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div>
            <h1>DORAVIN PAYANAM</h1>
            <p>Pinpoint the exact coordinates of the target image.</p>
        </div>
    </header>

    <main class="grid-container">
        <section class="map-section">
            <div class="map-box">
                <div id="map"></div>
            </div>
            <div class="control-box">
                <button id="guess-btn" disabled>Submit Coordinates</button>
                <div id="result-box"></div>
            </div>
        </section>

        <section class="image-section">
            <img src="target.jpg" alt="Target Location" id="target-img">
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
